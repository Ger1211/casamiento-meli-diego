<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fotos — Melina &amp; Diego</title>
<link rel="icon" type="image/png" href="corazon.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,900;1,500;1,600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

:root{
  --marfil: #F6F0E6;
  --marfil-2: #FBF7F0;
  --arena: #D9C3A9;
  --rosa-claro: #ECD3CC;
  --rosa-empolvado: #D8A8A2;
  --bordo: #6E1B2B;
  --bordo-deep: #4E1120;
  --oliva: #7A7A50;
  --ink: #2B2018;
  --ink-soft: #5A4E44;
}

*{ box-sizing:border-box; margin:0; padding:0; }

html{ scroll-behavior:smooth; }

body{
  margin:0;
  background:var(--marfil);
  color:var(--ink);
  font-family:'Jost', sans-serif;
  font-weight:300;
  overflow-x:hidden;
  width:100%;
  min-height:100vh;
  min-height:-webkit-fill-available;
}

.container{ max-width:680px; margin:0 auto; padding:40px 20px; }

.page-title{
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-weight:500;
  font-size: clamp(2rem, 6vw, 2.8rem);
  text-align:center;
  color:var(--bordo-deep);
  margin-bottom:8px;
}

.page-subtitle{
  font-family:'Jost', sans-serif;
  letter-spacing:.25em;
  text-transform:uppercase;
  font-size:.72rem;
  font-weight:500;
  color:var(--bordo);
  text-align:center;
  margin-bottom:32px;
}

/* ===== UPLOAD CARD ===== */
.upload-card{
  background:var(--marfil-2);
  border:2px solid var(--arena);
  border-radius:12px;
  padding:36px 22px;
  max-width:560px;
  margin:0 auto 24px;
  box-shadow: 0 8px 32px rgba(110,27,43,0.08);
}
@media (min-width:640px){ .upload-card{ padding:40px 36px; } }

.file-label{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:18px 24px;
  background:var(--marfil);
  border:2px dashed var(--arena);
  border-radius:8px;
  cursor:pointer;
  transition:border-color .2s;
  font-size:.95rem;
  letter-spacing:.04em;
  color:var(--ink-soft);
  margin-bottom:20px;
}
.file-label:hover{ border-color:var(--bordo); }
.file-label svg{ width:22px; height:22px; flex-shrink:0; color:var(--bordo); }

#file-input{ display:none; }

.file-name{
  text-align:center;
  font-size:.78rem;
  color:var(--oliva);
  margin-top:-12px;
  margin-bottom:20px;
  min-height:18px;
}

.field{ margin-bottom:20px; }
.field input[type=text]{
  width:100%;
  padding:14px 14px;
  border:1px solid var(--arena);
  border-radius:6px;
  background:var(--marfil);
  font-family:'Jost', sans-serif;
  font-size:1rem;
  color:var(--ink);
  transition:border-color .2s;
}
.field input[type=text]:focus{
  outline:none;
  border-color:var(--bordo);
}

.submit-btn{
  width:100%;
  padding:16px;
  border:none;
  background:var(--bordo);
  color:var(--marfil-2);
  border-radius:6px;
  letter-spacing:.18em;
  text-transform:uppercase;
  font-size:.82rem;
  font-weight:600;
  cursor:pointer;
  box-shadow: 0 4px 14px rgba(110,27,43,0.25);
  transition: background .25s, transform .15s;
}
.submit-btn:hover{ background:var(--bordo-deep); transform:translateY(-1px); }
.submit-btn:disabled{ opacity:.6; cursor:default; transform:none; }

.status-msg{
  text-align:center;
  margin-top:16px;
  font-size:.9rem;
  min-height:22px;
  font-weight:400;
}
.status-msg.success{ color:var(--oliva); }
.status-msg.error{ color:var(--bordo); }

/* ===== GALLERY ===== */
.gallery-section{
  max-width:680px;
  margin:0 auto;
}

.gallery-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:24px;
}
@media (max-width:480px){
  .gallery-grid{ grid-template-columns:repeat(2,1fr); gap:6px; }
}

.gallery-item{
  position:relative;
  aspect-ratio:1;
  background:var(--marfil-2);
  border:1px solid var(--arena);
  border-radius:4px;
  overflow:hidden;
}

.gallery-item img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.gallery-item .loader{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--marfil-2);
}

.loader-spin{
  width:24px;
  height:24px;
  border:2px solid var(--arena);
  border-top-color:var(--bordo);
  border-radius:50%;
  animation: spin .6s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }

/* ===== PAGINATION ===== */
.pagination{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;
  margin-bottom:40px;
}

.page-btn{
  padding:10px 24px;
  background:transparent;
  color:var(--oliva);
  border:1px solid var(--oliva);
  border-radius:4px;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-size:.72rem;
  font-weight:500;
  cursor:pointer;
  transition:.25s;
  font-family:'Jost', sans-serif;
}
.page-btn:hover{ background:var(--oliva); color:var(--marfil-2); }
.page-btn:disabled{ opacity:.4; cursor:default; }

.page-info{
  font-size:.78rem;
  color:var(--ink-soft);
  letter-spacing:.06em;
}

.gallery-empty{
  text-align:center;
  padding:40px 20px;
  color:var(--ink-soft);
  font-size:.95rem;
}

/* ===== BACK LINK ===== */
.back-link{
  display:block;
  text-align:center;
  margin:20px 0 60px;
  color:var(--ink-soft);
  font-size:.85rem;
  text-decoration:none;
}
.back-link:hover{ color:var(--bordo); }

/* ===== LIGHTBOX ===== */
.lightbox-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(43,32,24,0.92);
  z-index:200;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.lightbox-overlay.active{ display:flex; }
.lightbox-overlay img{
  max-width:92vw;
  max-height:90vh;
  border-radius:6px;
  box-shadow:0 8px 40px rgba(0,0,0,0.5);
  cursor:default;
}
.lightbox-close{
  position:absolute;
  top:16px;
  right:24px;
  color:white;
  font-size:2rem;
  cursor:pointer;
  line-height:1;
  z-index:201;
}
.lightbox-close:hover{ opacity:.7; }

/* ===== UPLOAD BUTTONS ===== */
.upload-buttons{
  display:flex;
  gap:12px;
  margin-bottom:20px;
}
@media (max-width:400px){
  .upload-buttons{ flex-direction:column; }
}
.upload-btn{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:15px 16px;
  border:2px dashed var(--arena);
  border-radius:8px;
  background:var(--marfil);
  cursor:pointer;
  font-family:'Jost',sans-serif;
  font-size:.9rem;
  letter-spacing:.04em;
  color:var(--ink-soft);
  transition:.2s;
}
.upload-btn:hover{ border-color:var(--bordo); color:var(--ink); }
.upload-btn svg{ width:20px; height:20px; flex-shrink:0; color:var(--bordo); }

</style>
</head>
<body>

<div class="container">

  <h1 class="page-title">Compartí tus fotos</h1>
  <p class="page-subtitle">Ayudanos a guardar recuerdos de este dia</p>

  <!-- UPLOAD -->
  <div class="upload-card" id="upload-card">

    <div class="upload-buttons">
      <label class="upload-btn" for="camera-input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Tomar foto
      </label>
      <label class="upload-btn" for="gallery-input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Elegir de galeria
      </label>
    </div>
    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none">
    <input type="file" id="gallery-input" accept="image/*" style="display:none">
    <div class="file-name" id="file-name"></div>

    <div class="field">
      <input type="text" id="guest-name" placeholder="Tu nombre (opcional)" maxlength="50">
    </div>

    <button class="submit-btn" id="submit-btn" disabled>Subir foto</button>
    <div class="status-msg" id="status-msg"></div>
  </div>

  <!-- GALLERY -->
  <div class="gallery-section">
    <div class="gallery-grid" id="gallery-grid"></div>
    <div class="gallery-empty" id="gallery-empty" style="display:none;">
      Todavia no hay fotos. Se la primera en compartir.
    </div>
    <div class="pagination" id="pagination" style="display:none;">
      <button class="page-btn" id="prev-btn">&larr; Anterior</button>
      <span class="page-info" id="page-info"></span>
      <button class="page-btn" id="next-btn">Siguiente &rarr;</button>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox-overlay" id="lightbox">
    <span class="lightbox-close" id="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="">
  </div>

  <a href="https://meliydiego.site" class="back-link">Volver a la invitacion</a>

</div>

<script>

const API_BASE_URL = 'https://desktop-udmt3js.tailfe106b.ts.net';

const cameraInput = document.getElementById('camera-input');
const galleryInput = document.getElementById('gallery-input');
const fileName = document.getElementById('file-name');
const guestNameInput = document.getElementById('guest-name');
const submitBtn = document.getElementById('submit-btn');
const statusMsg = document.getElementById('status-msg');
const galleryGrid = document.getElementById('gallery-grid');
const galleryEmpty = document.getElementById('gallery-empty');
const pagination = document.getElementById('pagination');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
const pageInfo = document.getElementById('page-info');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const lightboxClose = document.getElementById('lightbox-close');

let selectedFile = null;
let currentPage = 0;
const PAGE_SIZE = 6;

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  selectedFile = file;
  fileName.textContent = file.name;
  submitBtn.disabled = false;
  statusMsg.textContent = '';
  statusMsg.className = 'status-msg';
}

cameraInput.addEventListener('change', handleFileSelect);
galleryInput.addEventListener('change', handleFileSelect);

submitBtn.addEventListener('click', async () => {
  if (!selectedFile) return;

  submitBtn.disabled = true;
  submitBtn.textContent = 'Subiendo...';
  statusMsg.textContent = '';
  statusMsg.className = 'status-msg';

  const formData = new FormData();
  formData.append('files', selectedFile);
  const guestName = guestNameInput.value.trim();
  if (guestName) formData.append('guestName', guestName);

  try {
    const resp = await fetch(`${API_BASE_URL}/api/upload`, {
      method: 'POST',
      body: formData
    });
    const data = await resp.json();

    if (data.success && data.uploaded > 0) {
      statusMsg.textContent = 'Las fotos se subieron correctamente.';
      statusMsg.className = 'status-msg success';
      cameraInput.value = '';
      galleryInput.value = '';
      selectedFile = null;
      fileName.textContent = '';
      submitBtn.disabled = true;
      guestNameInput.value = '';
      currentPage = 0;
      loadGallery();
    } else {
      statusMsg.textContent = data.message || 'Ocurrio un error al subir la foto.';
      statusMsg.className = 'status-msg error';
    }
  } catch (err) {
    statusMsg.textContent = 'No se pudo conectar con el servidor. Intenta de nuevo.';
    statusMsg.className = 'status-msg error';
  }

  submitBtn.textContent = 'Subir foto';
  submitBtn.disabled = !selectedFile;
});

async function loadGallery() {
  galleryGrid.innerHTML = '';
  for (let i = 0; i < PAGE_SIZE; i++) {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.innerHTML = '<div class="loader"><div class="loader-spin"></div></div>';
    galleryGrid.appendChild(item);
  }

  try {
    const resp = await fetch(`${API_BASE_URL}/api/photos?page=${currentPage}&size=${PAGE_SIZE}`);
    const data = await resp.json();

    galleryGrid.innerHTML = '';

    if (!data.photos || data.photos.length === 0) {
      galleryEmpty.style.display = 'block';
      pagination.style.display = 'none';
      return;
    }

    galleryEmpty.style.display = 'none';
    pagination.style.display = 'flex';

    totalPages = data.hasMore ? currentPage + 2 : currentPage + 1;
    pageInfo.textContent = `Pagina ${currentPage + 1} de ${totalPages}`;
    prevBtn.disabled = currentPage === 0;
    nextBtn.disabled = !data.hasMore;

    data.photos.forEach(photo => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      if (photo.thumbnail) {
        const img = document.createElement('img');
        img.src = photo.thumbnail;
        img.alt = 'Foto';
        img.loading = 'lazy';
        img.style.cursor = 'pointer';
        img.addEventListener('click', () => {
          lightboxImg.src = photo.thumbnail;
          lightbox.classList.add('active');
        });
        item.appendChild(img);
      }
      galleryGrid.appendChild(item);
    });

  } catch (err) {
    galleryGrid.innerHTML = '';
    galleryEmpty.textContent = 'No se pudo cargar la galeria. Verifica la conexion.';
    galleryEmpty.style.display = 'block';
    pagination.style.display = 'none';
  }
}

prevBtn.addEventListener('click', () => {
  if (currentPage > 0) {
    currentPage--;
    loadGallery();
    window.scrollTo({ top: galleryGrid.offsetTop - 100, behavior: 'smooth' });
  }
});

nextBtn.addEventListener('click', () => {
  currentPage++;
  loadGallery();
  window.scrollTo({ top: galleryGrid.offsetTop - 100, behavior: 'smooth' });
});

loadGallery();

lightboxClose.addEventListener('click', () => lightbox.classList.remove('active'));
lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) lightbox.classList.remove('active');
});

</script>

</body>
</html>
